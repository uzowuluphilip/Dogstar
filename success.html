<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful</title>
    <style>
      :root {
        --bg: #050505;
        --panel: #111111;
        --text: #f5f5f5;
        --accent: #b11b1b;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 32px;
        max-width: 480px;
        text-align: center;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin-top: 0;
        color: var(--accent);
      }

      p {
        line-height: 1.6;
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Payment successful!</h1>
      <p>Thank you for your order. Your tickets will be confirmed shortly.</p>
    </main>
  </body>
</html>
